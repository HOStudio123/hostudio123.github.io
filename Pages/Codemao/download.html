<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Nemo作品下载器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.7.1/jszip.min.js"></script>
    <style>
        /* 保持原有样式不变，新增加载动画 */
        .loader {
            display: none;
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #3498db;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 保持原有HTML结构不变 -->
    
    <script>
        // 并发控制配置
        const CONCURRENT = {
            IMAGE: 5,   // 图片并行下载数
            WORK: 2     // 作品并行处理数
        };

        // 带重试的下载方法
        async function fetchWithRetry(url, retries = 3) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url);
                    if (response.ok) return response;
                    throw new Error(`HTTP ${response.status}`);
                } catch (err) {
                    if (i === retries - 1) throw err;
                    await new Promise(r => setTimeout(r, 1000 * (i + 1)));
                }
            }
        }

        // 并行处理数组的通用方法
        async function parallelProcess(array, processor, concurrency) {
            const results = [];
            const batches = [];
            
            for (let i = 0; i < array.length; i += concurrency) {
                batches.push(array.slice(i, i + concurrency));
            }

            for (const batch of batches) {
                const batchResults = await Promise.allSettled(
                    batch.map(item => processor(item))
                );
                results.push(...batchResults);
            }
            
            return results;
        }

        async function processWork(zip, userId, workId, progressCallback) {
            const basePath = `${userId}/user_works/${workId}/`;
            
            // 并行获取作品信息
            const [info, bcm] = await Promise.all([
                fetchWithRetry(`https://api.codemao.cn/creation-tools/v1/works/${workId}/source/public`)
                    .then(r => r.json()),
                fetchWithRetry(`https://api.codemao.cn/creation-tools/v1/works/${workId}/source/public`)
                    .then(r => r.json())
                    .then(info => fetchWithRetry(info.work_urls[0]))
                    .then(r => r.json())
            ]);

            // 并行处理图片资源
            const imageEntries = Object.entries(bcm.styles.styles_dict)
                .filter(([_, style]) => style.url)
                .map(([id, style]) => ({ id, url: style.url }));

            const processedImages = [];
            let progress = 0;
            
            await parallelProcess(imageEntries, async (entry) => {
                try {
                    const blob = await fetchWithRetry(entry.url).then(r => r.blob());
                    const hash = await sha256(entry.url);
                    const filename = `${hash}.webp`;
                    
                    zip.file(materialPath + filename, blob);
                    processedImages.push({
                        id: entry.id,
                        path: `${userId}/user_material/${filename}`
                    });
                } catch (e) {
                    console.error(`图片下载失败: ${entry.url}`, e);
                }
                
                progress += 1/imageEntries.length;
                progressCallback(progress * 0.7); // 70%用于图片
            }, CONCURRENT.IMAGE);

            // 创建用户图片配置
            const userImg = {
                user_img_dict: processedImages.reduce((dict, img) => {
                    dict[img.id] = { id: img.id, path: img.path };
                    return dict;
                }, {})
            };

            // 并行保存元数据和封面
            await Promise.all([
                zip.file(`${basePath}${workId}.userimg`, JSON.stringify(userImg)),
                zip.file(`${basePath}${workId}.meta`, JSON.stringify({
                    bcm_name: info.name,
                    bcm_version: info.bcm_version,
                    // 其他元数据...
                })),
                fetchWithRetry(info.preview)
                    .then(r => r.blob())
                    .then(cover => zip.file(`${basePath}${workId}.cover`, cover))
            ]);

            return true;
        }

        async function startDownload() {
            const userId = document.getElementById('userId').value;
            const workIds = document.getElementById('workIds').value.split(',').map(id => id.trim());
            const zip = new JSZip();
            
            try {
                // 显示加载动画
                const button = document.querySelector('button');
                button.disabled = true;
                const loader = document.createElement('div');
                loader.className = 'loader';
                button.parentNode.appendChild(loader);
                loader.style.display = 'inline-block';

                // 并行处理作品
                await parallelProcess(workIds, async (workId) => {
                    const start = Date.now();
                    await processWork(zip, userId, workId, p => {
                        const elapsed = (Date.now() - start)/1000;
                        console.log(`[${workId}] 进度: ${(p*100).toFixed(1)}% 用时: ${elapsed.toFixed(1)}s`);
                    });
                }, CONCURRENT.WORK);

                // 生成ZIP文件
                const content = await zip.generateAsync({
                    type: 'blob',
                    compression: 'DEFLATE',
                    compressionOptions: { level: 9 }
                });

                // 下载文件
                const url = URL.createObjectURL(content);
                const a = document.createElement('a');
                a.href = url;
                a.download = `works_${Date.now()}.zip`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

            } catch (e) {
                document.getElementById('error').textContent = `错误: ${e.message}`;
            } finally {
                document.querySelector('.loader').remove();
                document.querySelector('button').disabled = false;
                document.querySelector('.progress-container').style.display = 'none';
            }
        }
    </script>
</body>
</html>
