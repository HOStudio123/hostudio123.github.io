<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Works</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h1 {
            color: #333;
        }
        form {
            margin-top: 20px;
        }
        input, button {
            padding: 10px;
            margin: 5px;
            font-size: 16px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .progress {
            margin-top: 20px;
            display: none;
        }
        .progress-bar {
            width: 100%;
            background-color: #f3f3f3;
            border-radius: 5px;
            overflow: hidden;
        }
        .progress-bar-inner {
            width: 0;
            height: 30px;
            background-color: #007bff;
            text-align: center;
            line-height: 30px;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Codemao 作品下载器</h1>
    <form id="downloadForm">
        <input type="number" id="user_id" placeholder="用户ID" required>
        <input type="text" id="work_ids" placeholder="作品ID（多个用逗号分隔）" required>
        <button type="submit">生成下载包</button>
    </form>
    <div class="progress">
        <div class="progress-bar">
            <div class="progress-bar-inner">0%</div>
        </div>
    </div>

    <script>
        class Hash {
            static sha256(data) {
                return crypto.subtle.digest('SHA-256', new TextEncoder().encode(data))
                    .then(hash => {
                        return Array.from(new Uint8Array(hash))
                            .map(b => b.toString(16).padStart(2, '0'))
                            .join('');
                    });
            }
        }

        class NemoDecompiler {
            static async decompile(user_id, work_ids, onUpdate) {
                const zip = new JSZip();
                const f_user = `${user_id}/`;
                const f_material = `${f_user}user_material/`;
                const f_works = `${f_user}user_works/`;

                for (let i = 0; i < work_ids.length; i++) {
                    const work_id = work_ids[i];
                    if (!work_id) continue;

                    const f_work = `${f_works}${work_id}/`;
                    const user_img = { user_img_dict: {} };
                    const meta = {
                        bcm_count: {
                            block_cnt_without_invisible: 0.0,
                            block_cnt: 0.0,
                            entity_cnt: 1.0,
                        },
                        bcm_name: "未命名作品",
                        bcm_url: "",
                        bcm_version: "0.16.2",
                        download_fail: false,
                        extraDatas: {},
                        have_published_status: false,
                        have_remote_resources: false,
                        isLandscape: false,
                        isMicroBit: false,
                        isValid: false,
                        mcloudVariable: [],
                        publish_preview: "",
                        publish_status: 0,
                        reviewState: 0,
                        template_id: 0,
                        term_id: 0,
                        type: 0,
                        upload_status: {
                            work_id: work_id,
                            have_uploaded: 2,
                        },
                    };

                    try {
                        const info = await fetch(`https://api.codemao.cn/creation-tools/v1/works/${work_id}/source/public`)
                            .then(res => res.json());
                        meta.bcm_url = info.work_urls[0];
                        const bcm = await fetch(meta.bcm_url).then(res => res.json());
                        zip.file(`${f_work}${work_id}.bcm`, JSON.stringify(bcm));

                        const usrimg = [];
                        for (const k in bcm.styles.styles_dict) {
                            try {
                                const url = bcm.styles.styles_dict[k].url;
                                if (url) usrimg.push({ id: k, url });
                            } catch (e) {}
                        }

                        for (const v of usrimg) {
                            const hash = await Hash.sha256(v.url);
                            const ext = v.url.split('.').pop();
                            const filename = `${hash}.${ext}`;
                            const imgData = await fetch(v.url).then(res => res.blob());
                            zip.file(`${f_material}${filename}`, imgData);
                            user_img.user_img_dict[v.id] = { id: v.id, path: `${f_user}user_material/${filename}` };
                        }

                        zip.file(`${f_work}${work_id}.userimg`, JSON.stringify(user_img));
                        meta.bcm_name = info.name;
                        meta.bcm_version = info.bcm_version;
                        zip.file(`${f_work}${work_id}.meta`, JSON.stringify(meta));

                        const coverData = await fetch(info.preview).then(res => res.blob());
                        zip.file(`${f_work}${work_id}.cover`, coverData);

                        onUpdate((i + 1) / work_ids.length);
                    } catch (error) {
                        console.error(`处理作品 ${work_id} 时出错:`, error);
                    }
                }

                return zip.generateAsync({ type: "blob" });
            }
        }

        document.getElementById('downloadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user_id = document.getElementById('user_id').value;
            const work_ids = document.getElementById('work_ids').value.split(',').map(id => id.trim());
            const progressBar = document.querySelector('.progress-bar-inner');
            const progressContainer = document.querySelector('.progress');

            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            progressBar.textContent = '0%';

            try {
                const zipBlob = await NemoDecompiler.decompile(user_id, work_ids, (progress) => {
                    const percent = Math.round(progress * 100);
                    progressBar.style.width = `${percent}%`;
                    progressBar.textContent = `${percent}%`;
                });

                const url = URL.createObjectURL(zipBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'works.zip';
                document.body.appendChild(a);
                a.click();
                URL.revokeObjectURL(url);
                document.body.removeChild(a);
            } catch (error) {
                console.error('生成ZIP文件时出错:', error);
                alert('生成ZIP文件时出错，请检查控制台日志。');
            }
        });
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</body>
</html>
